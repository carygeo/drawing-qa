version: '3.8'

services:
  drawing-qa:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./drawing_index:/app/drawing_index
      - ./pdfs:/app/pdfs
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
